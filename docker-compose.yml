services:
  db:
    image: postgres:17-alpine
    container_name: kanto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanto
      POSTGRES_PASSWORD: kanto_dev
      POSTGRES_DB: kanto
    ports:
      - "5433:5432"
    volumes:
      - kanto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanto -d kanto"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kanto_pgdata:
